{% extends 'reception/base.html' %}

{% block content %}
<h2>المرحلة الأولى: واجهة الاستقبال</h2>

<form method="post">
    {% csrf_token %}

    <div class="form-grid">
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <small style="color:red;">{{ field.errors }}</small>
                {% endif %}
            </div>
        {% endfor %}
    </div>

    <button type="submit" class="btn">حفظ وتحويل إلى التقييم الطبي</button>
</form>
{% endblock %}
